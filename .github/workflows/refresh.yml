name: Daily data refresh
on:
  schedule:
    - cron: "30 21 * * 1-5"  # 21:30 UTC weekdays, after US close
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install yfinance requests
      - run: python etl/run_all.py
      - name: Commit refreshed data
        run: |
          git config user.name "etl-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ frontend/data/
          git diff --cached --quiet || git commit -m "data: daily refresh"
          git push
