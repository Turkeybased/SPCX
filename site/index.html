<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IPO Context Dashboard — SPCX / Anthropic / OpenAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0f1419; --card:#1a212b; --ink:#e6e9ee; --dim:#8a94a3;
          --accent:#4da3ff; --warn:#ffb454; --ok:#5fd068; --line:#2a3340; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:14px/1.5 "Segoe UI",system-ui,sans-serif; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; }
  h2 { font-size:15px; margin:28px 0 10px; color:var(--accent); }
  #stale { color:var(--dim); font-size:12px; margin-bottom:18px; }
  .cards { display:flex; gap:14px; flex-wrap:wrap; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
          padding:14px 16px; min-width:240px; flex:1; }
  .card .co { font-weight:600; font-size:16px; }
  .card .row { display:flex; justify-content:space-between; margin-top:6px; }
  .card .row span:first-child { color:var(--dim); }
  table { border-collapse:collapse; width:100%; background:var(--card);
          border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  th, td { padding:7px 10px; text-align:right; border-bottom:1px solid var(--line); }
  th:first-child, td:first-child { text-align:left; }
  th { cursor:pointer; user-select:none; color:var(--dim); background:#141a22; }
  th:hover { color:var(--ink); }
  tr.overlay { background:#10243a; font-weight:600; }
  .chips { display:flex; gap:10px; flex-wrap:wrap; }
  .chip { background:var(--card); border:1px solid var(--line); border-radius:999px;
          padding:6px 14px; font-size:13px; }
  .chip .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
               margin-right:6px; }
  .conf { color:var(--warn); cursor:help; }
  a { color:var(--accent); text-decoration:none; }
  .na { color:var(--dim); font-style:italic; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:14px 16px; }
  .chartbox { background:var(--card); border:1px solid var(--line);
              border-radius:10px; padding:14px; height:340px; }
  .src { font-size:11px; }
  .notice { background:#2a2113; border:1px solid var(--warn); border-radius:8px;
            padding:10px 14px; margin:14px 0; font-size:13px; }
</style>
</head>
<body>
<h1>IPO Context Dashboard</h1>
<div id="stale">loading…</div>
<div id="seed-notice"></div>

<h2>R1 · The three deals</h2>
<div class="cards" id="deal-cards"></div>

<h2>R6 · Filing status</h2>
<div class="chips" id="filing-chips"></div>

<h2>R5 · SPCX price vs $135 target</h2>
<div class="chartbox"><canvas id="spcx-chart"></canvas></div>

<h2>R2 · Mega-IPOs in context <span style="color:var(--dim);font-weight:400">(click headers to sort; SPCX overlaid)</span></h2>
<div id="mega-table"></div>

<h2>R3 · Day-1 pop vs 1-yr return <span style="color:var(--dim);font-weight:400">(point size = raise)</span></h2>
<div class="chartbox"><canvas id="scatter"></canvas></div>

<h2>R4 · Cohort stats</h2>
<div class="panel" id="cohorts"></div>

<script>
const NA = '<span class="na">n/a — see findings doc</span>';
const fmt = (v, suf='') => (v === null || v === undefined) ? NA : v.toLocaleString() + suf;
const fmtUsd = v => (v == null) ? NA :
  (v >= 1e12 ? '$' + (v/1e12).toFixed(2) + 'T' :
   v >= 1e9  ? '$' + (v/1e9).toFixed(1)  + 'B' : '$' + v.toLocaleString());
const conflict = n => n ? ` <span class="conf" title="${n.replace(/"/g,'&quot;')}">⚠</span>` : '';
const srcLink = u => u ? ` <a class="src" href="${u}" target="_blank">[src]</a>` : '';

async function load(p) {
  try { const r = await fetch(p); if (!r.ok) throw 0; return await r.json(); }
  catch { return null; }
}

(async () => {
  const [comps, prices, filings] = await Promise.all([
    load('../data/comps.json'), load('../data/prices.json'), load('../data/filing_status.json')]);

  // staleness header
  const stale = [];
  if (prices?.generated_at) stale.push('prices: ' + prices.generated_at);
  if (filings?.generated_at) stale.push('filings: ' + filings.generated_at);
  if (comps?._meta?.as_of) stale.push('seed as of: ' + comps._meta.as_of);
  document.getElementById('stale').textContent =
    stale.length ? 'Data refreshed — ' + stale.join(' · ') : 'No data files found — run etl/run_all.py';

  if (comps?._meta?.status?.includes('INCOMPLETE'))
    document.getElementById('seed-notice').innerHTML =
      `<div class="notice">⚠ Historical seed incomplete: ${comps._meta.note}</div>`;

  // R1 deal cards
  const cards = document.getElementById('deal-cards');
  for (const d of comps?.deals ?? []) {
    cards.insertAdjacentHTML('beforeend', `<div class="card">
      <div class="co">${d.company}${d.ticker ? ' · ' + d.ticker : ''}${conflict(d.conflict_note)}</div>
      <div class="row"><span>Status</span><span>${d.status ?? NA}</span></div>
      <div class="row"><span>Target price</span><span>${d.target_price_usd ? '$'+d.target_price_usd : NA}</span></div>
      <div class="row"><span>Target valuation</span><span>${fmtUsd(d.target_valuation_usd)}</span></div>
      <div class="row"><span>Raise</span><span>${fmtUsd(d.raise_usd)}</span></div>
      <div class="row"><span>Source</span><span>${srcLink(d.source_url) || NA}</span></div>
    </div>`);
  }

  // R6 filing chips
  const chips = document.getElementById('filing-chips');
  for (const c of filings?.companies ?? []) {
    const pub = /PUBLIC|FILED|on EDGAR$/.test(c.status ?? '');
    const err = (c.status ?? '').startsWith('error');
    const color = err ? 'var(--warn)' : pub ? 'var(--ok)' : 'var(--dim)';
    chips.insertAdjacentHTML('beforeend',
      `<span class="chip"><span class="dot" style="background:${color}"></span>` +
      `<b>${c.name}</b> — ${c.status}` +
      (c.confidential_s1_filed ? ` (confidential S-1 ${c.confidential_s1_filed})` : '') +
      (c.public_s1?.url ? srcLink(c.public_s1.url) : '') + `</span>`);
  }
  if (!(filings?.companies?.length)) chips.innerHTML = NA;

  // R5 SPCX line
  const series = prices?.prices?.SPCX?.series;
  const ctx5 = document.getElementById('spcx-chart');
  if (series?.length) {
    new Chart(ctx5, { type:'line', data:{
      labels: series.map(p => p.date),
      datasets:[
        { label:'SPCX close', data: series.map(p => p.close), borderColor:'#4da3ff', pointRadius:0, tension:.2 },
        { label:'$135 target', data: series.map(() => 135), borderColor:'#ffb454', borderDash:[6,4], pointRadius:0 }]},
      options:{ maintainAspectRatio:false, plugins:{legend:{labels:{color:'#e6e9ee'}}},
        scales:{ x:{ticks:{color:'#8a94a3'}}, y:{ticks:{color:'#8a94a3'}} } }});
  } else {
    ctx5.parentElement.innerHTML =
      '<span class="na">SPCX not yet trading (first trade expected 2026-06-12) — no price series.</span>' +
      ' <span style="color:var(--dim)">Target: $135/share.</span>';
  }

  // R2 sortable mega-IPO table
  const mega = comps?.mega_ipos ?? [];
  const spcx = (comps?.deals ?? []).find(d => d.ticker === 'SPCX');
  const cols = [
    ['company','Company'], ['ipo_date','IPO date'], ['raise_usd','Raise'],
    ['valuation_usd','Valuation'], ['day1_return_pct','Day-1 %'],
    ['one_yr_return_pct','1-yr %'], ['return_to_date_pct','To-date %']];
  let sortKey = 'raise_usd', sortDir = -1;
  function renderTable() {
    const rows = [...mega].sort((a,b) => {
      const x = a[sortKey], y = b[sortKey];
      if (x == null) return 1; if (y == null) return -1;
      return (x < y ? -1 : x > y ? 1 : 0) * sortDir;
    });
    const overlay = spcx ? [{...spcx, valuation_usd: spcx.target_valuation_usd, _overlay:true}] : [];
    const html = `<table><thead><tr>` +
      cols.map(([k,l]) => `<th data-k="${k}">${l}${sortKey===k ? (sortDir<0?' ▼':' ▲') : ''}</th>`).join('') +
      `</tr></thead><tbody>` +
      [...overlay, ...rows].map(r => `<tr${r._overlay ? ' class="overlay"' : ''}>` + cols.map(([k]) => {
        let v = r[k];
        let cell = (k==='raise_usd'||k==='valuation_usd') ? fmtUsd(v)
          : k.endsWith('_pct') ? (v==null ? NA : v.toFixed(1)+'%' + (r.verified && k==='one_yr_return_pct' ? ' ✓' : ''))
          : (v ?? NA);
        if (k==='company') cell = `${v ?? '?'}${r._overlay ? ' (SPCX — pending)' : ''}${conflict(r.conflict_note)}${srcLink(r.source_url)}`;
        return `<td>${cell}</td>`; }).join('') + `</tr>`).join('') +
      `</tbody></table>` +
      (mega.length ? '' : `<p>${NA} — mega-IPO table empty until findings doc is transcribed.</p>`);
    document.getElementById('mega-table').innerHTML = html;
    document.querySelectorAll('#mega-table th').forEach(th =>
      th.onclick = () => { const k = th.dataset.k;
        sortDir = (k === sortKey) ? -sortDir : -1; sortKey = k; renderTable(); });
  }
  renderTable();

  // R3 scatter
  const pts = mega.concat(comps?.tech_comps ?? [])
    .filter(r => r.day1_return_pct != null && r.one_yr_return_pct != null);
  const ctx3 = document.getElementById('scatter');
  if (pts.length) {
    new Chart(ctx3, { type:'bubble', data:{ datasets:[{
      label:'IPO comps',
      data: pts.map(r => ({ x:r.day1_return_pct, y:r.one_yr_return_pct,
        r: r.raise_usd ? Math.max(4, Math.sqrt(r.raise_usd/1e9)*3) : 5, meta:r })),
      backgroundColor:'rgba(77,163,255,.55)' }]},
      options:{ maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: c => {
          const m = c.raw.meta;
          return `${m.company}: day-1 ${m.day1_return_pct}%, 1-yr ${m.one_yr_return_pct}%` +
                 (m.raise_usd ? `, raised ${(m.raise_usd/1e9).toFixed(1)}B` : '') +
                 (m.conflict_note ? ' ⚠ ' + m.conflict_note : ''); }}}},
        scales:{ x:{title:{display:true,text:'Day-1 pop %',color:'#8a94a3'},ticks:{color:'#8a94a3'}},
                 y:{title:{display:true,text:'1-yr return %',color:'#8a94a3'},ticks:{color:'#8a94a3'}} }}});
  } else {
    ctx3.parentElement.innerHTML = `<span class="na">No scatter points — needs day-1 and 1-yr figures from the findings doc + price ETL.</span>`;
  }

  // R4 cohorts
  const co = comps?.cohorts ?? [];
  document.getElementById('cohorts').innerHTML = co.length
    ? co.map(c => `<div class="row" style="display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:5px 0">
        <span>${c.cohort ?? c.name ?? '?'}${conflict(c.conflict_note)}${srcLink(c.source_url)}</span>
        <span>${Object.entries(c).filter(([k]) => !['cohort','name','source_url','conflict_note','as_of'].includes(k))
          .map(([k,v]) => `${k}: ${v ?? 'n/a'}`).join(' · ')}</span></div>`).join('')
    : NA + ' — cohort panel empty until findings doc is transcribed.';
})();
</script>
</body>
</html>
